<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal | Professional Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --accent-red: #b91c1c;
            --bg-body: #0f1115;
            --bg-card: #1a1d23;
            --text-main: #f1f1f1;
            --text-muted: #94a3b8;
            --border-color: #2d333b;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1d23 0%, #0f1115 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-placeholder {
            width: 120px;
            height: 50px;
            background: #2d333b;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px dashed var(--text-muted);
            cursor: pointer;
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { font-weight: 700; font-size: 1.25rem; margin-bottom: 20px; display: flex; align-items: center; }
        h2::before { content: ''; width: 4px; height: 20px; background: var(--primary-red); margin-right: 12px; border-radius: 2px; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input, textarea {
            width: 100%;
            background: #252930;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        select:focus, input:focus, textarea:focus { border-color: var(--primary-red); outline: none; box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.2); }

        .tab-container { display: flex; background: #252930; border-radius: 10px; padding: 5px; margin-bottom: 20px; gap: 5px; }

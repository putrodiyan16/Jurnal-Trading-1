<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal | Professional Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --accent-red: #b91c1c;
            --bg-body: #0f1115;
            --bg-card: #1a1d23;
            --text-main: #f1f1f1;
            --text-muted: #94a3b8;
            --border-color: #2d333b;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #1a1d23 0%, #0f1115 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-placeholder {
            width: 120px;
            height: 50px;
            background: #2d333b;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px dashed var(--text-muted);
            cursor: pointer;
            overflow: hidden;
        }

        .logo-placeholder img { width: 100%; height: 100%; object-fit: contain; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { font-weight: 700; font-size: 1.25rem; margin-bottom: 20px; display: flex; align-items: center; }
        h2::before { content: ''; width: 4px; height: 20px; background: var(--primary-red); margin-right: 12px; border-radius: 2px; }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select, input, textarea {
            width: 100%;
            background: #252930;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        select:focus, input:focus, textarea:focus { border-color: var(--primary-red); outline: none; box-shadow: 0 0 0 2px rgba(230, 57, 70, 0.2); }

        .tab-container { display: flex; background: #252930; border-radius: 10px; padding: 5px; margin-bottom: 20px; gap: 5px; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 7px;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary-red); color: white; }
        .tab-content { display: none; border-top: 1px solid var(--border-color); padding-top: 20px; margin-bottom: 20px; }
        .tab-content.active { display: block; }

        .btn-save {
            background: linear-gradient(to right, var(--primary-red), var(--accent-red));
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4); }

        .chart-container { position: relative; height: 300px; width: 100%; }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .card { padding: 18px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder" onclick="document.getElementById('logoInput').click()">
        <span id="logoText">GANTI LOGO</span>
        <img id="logoImg" style="display:none;">
    </div>
    <input type="file" id="logoInput" style="display:none" accept="image/*" onchange="loadLogo(event)">
    <p style="color: var(--text-muted); font-size: 0.9rem;">Trade Performance Analysis</p>
</header>

<div class="container">
    <div class="card">
        <h2>Performance Analytics</h2>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>New Entry</h2>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label>Instrument</label>
            <select>
                <option>XAUUSD (Emas)</option>
                <option>XAGUSD (Perak)</option>
                <option>NAS100 (Nasdaq)</option>
            </select>
        </div>

        <div class="tab-container">
            <button class="tab-btn active" onclick="openTab(event, 'H4')">H4</button>
            <button class="tab-btn" onclick="openTab(event, 'H1')">H1</button>
            <button class="tab-btn" onclick="openTab(event, 'M30')">M30</button>
            <button class="tab-btn" onclick="openTab(event, 'M15')">M15</button>
        </div>

        <div id="H4" class="tab-content active">
            <div class="input-grid">
                <div><label>Trend MA</label><select><option>Buy</option><option>Sell</option></select></div>
                <div><label>RSI</label><select><option>Neutral</option><option>Overbought</option><option>Oversold</option></select></div>
                <div><label>Pola Candle</label><input type="text" placeholder="..."></div>
            </div>
            <div class="input-grid">
                <div><label>Harga Open</label><input type="text" placeholder="0.0000"></div>
                <div><label>Harga Close</label><input type="text" placeholder="0.0000"></div>
            </div>
        </div>

        <div id="H1" class="tab-content">
            <div class="input-grid">
                <div><label>Trend MA</label><select><option>Buy</option><option>Sell</option></select></div>
                <div><label>RSI</label><select><option>Neutral</option><option>Overbought</option><option>Oversold</option></select></div>
                <div><label>Pola Candle</label><input type="text" placeholder="..."></div>
            </div>
            <div class="input-grid">
                <div><label>Harga Open</label><input type="text" placeholder="0.0000"></div>
                <div><label>Harga Close</label><input type="text" placeholder="0.0000"></div>
            </div>
        </div>

        <div id="M30" class="tab-content">
            <div class="input-grid">
                <div><label>Trend MA</label><select><option>Buy</option><option>Sell</option></select></div>
                <div><label>RSI</label><select><option>Neutral</option><option>Overbought</option><option>Oversold</option></select></div>
                <div><label>Pola Candle</label><input type="text" placeholder="..."></div>
            </div>
            <div class="input-grid">
                <div><label>Harga Open</label><input type="text" placeholder="0.0000"></div>
                <div><label>Harga Close</label><input type="text" placeholder="0.0000"></div>
            </div>
        </div>

        <div id="M15" class="tab-content">
            <div class="input-grid">
                <div><label>Trend MA</label><select><option>Buy</option><option>Sell</option></select></div>
                <div><label>RSI</label><select><option>Neutral</option><option>Overbought</option><option>Oversold</option></select></div>
                <div><label>Pola Candle</label><input type="text" placeholder="..."></div>
            </div>
            <div class="input-grid">
                <div><label>Harga Open</label><input type="text" placeholder="0.0000"></div>
                <div><label>Harga Close</label><input type="text" placeholder="0.0000"></div>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label>Trading Notes & Analysis</label>
            <textarea rows="4" placeholder="Tulis alasan entry, psikologi saat trade, atau evaluasi di sini..."></textarea>
        </div>

        <button class="btn-save">LOG EXECUTION</button>
    </div>
</div>

<script>
    function openTab(evt, tfName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
        document.getElementById(tfName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function loadLogo(event) {
        const output = document.getElementById('logoImg');
        const text = document.getElementById('logoText');
        output.src = URL.createObjectURL(event.target.files[0]);
        output.style.display = 'block';
        text.style.display = 'none';
    }

    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
            datasets: [{
                label: 'Equity Curve',
                data: [1000, 1150, 1080, 1400, 1550],
                borderColor: '#e63946',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(230, 57, 70, 0.1)',
                pointRadius: 6,
                pointBackgroundColor: '#e63946'
            }]
        },
        options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: '#2d333b' }, ticks: { color: '#94a3b8' } },
                x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
            }
        }
    });
</script>

</body>
</html>

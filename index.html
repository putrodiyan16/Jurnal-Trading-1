<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal</title>
</head>

<body style="background:#111;color:white;font-family:sans-serif">

<h2>Trading Journal</h2>

<select id="pair">
  <option value="XAUUSD">XAUUSD</option>
  <option value="NAS100">NAS100</option>
</select>

<br><br>

<input type="number" id="open" placeholder="Open Price"><br><br>
<input type="number" id="close" placeholder="Close Price"><br><br>

<input type="text" id="candle" placeholder="Candle"><br><br>

<textarea id="notes" placeholder="Notes"></textarea><br><br>

<button onclick="kirimData()">Kirim</button>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzEDKyCY4jvm1p_Ae9WdwP7iegVNknuO2SUzb84lgTx0NEFq0_jf_LP2UnAke8u-MyA/exec";

function kirimData() {
  const open = parseFloat(document.getElementById("open").value);
  const close = parseFloat(document.getElementById("close").value);

  if (isNaN(open) || isNaN(close)) {
    alert("Isi harga dengan benar!");
    return;
  }

  const data = {
    pair: document.getElementById("pair").value,
    h4_trend: "Buy",
    h4_rsi: "Neutral",
    h1_trend: "Buy",
    h1_rsi: "Neutral",
    m30_trend: "Buy",
    m30_rsi: "Neutral",
    m15_trend: "Buy",
    m15_rsi: "Neutral",
    candle: document.getElementById("candle").value,
    open: open,
    close: close,
    notes: document.getElementById("notes").value,
    pips: ((close - open) * 100).toFixed(2)
  };

  fetch(scriptURL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    alert("Sukses: " + res);
  })
  .catch(err => {
    alert("Error: " + err);
  });
}
</script>

</body>
</html>

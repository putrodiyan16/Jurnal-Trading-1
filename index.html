<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-red: #cc0000;
            --dark-red: #8b0000;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-white: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--dark-red);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary-red);
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
            /* Ganti URL di bawah ini dengan logo Anda */
            content: url('https://via.placeholder.com/150x50/ff0000/ffffff?text=LOGO+ANDA');
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 5px solid var(--primary-red);
        }

        h2 { color: var(--primary-red); border-bottom: 1px solid #444; padding-bottom: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .timeframe-section {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #333;
        }

        .btn-submit {
            background-color: var(--primary-red);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit:hover { background-color: #ff0000; }

        canvas { background: #1e1e1e; border-radius: 8px; margin-top: 20px; }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="" alt="Trading Logo">
    </div>
    <h1>Trading Journal Dashboard</h1>
</header>

<div class="container">
    
    <div class="card">
        <h2>Performa Trading</h2>
        <canvas id="performanceChart"></canvas>
    </div>

    <div class="card">
        <h2>Input Trade Baru</h2>
        <form id="tradingForm">
            
            <div class="form-group">
                <label>Pair</label>
                <select id="pair">
                    <option value="emas">Emas (XAUUSD)</option>
                    <option value="perak">Perak (XAGUSD)</option>
                    <option value="nasdaq">Nasdaq (NAS100)</option>
                </select>
            </div>

            <div id="timeframe-container">
                <script>
                    const tfs = ["H4", "H1", "M30", "M15"];
                    tfs.forEach(tf => {
                        document.write(`
                            <div class="timeframe-section">
                                <h3>Timeframe ${tf}</h3>
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Trend MA</label>
                                        <select><option>Buy</option><option>Sell</option></select>
                                    </div>
                                    <div class="form-group">
                                        <label>RSI</label>
                                        <select><option>Overbought</option><option>Oversold</option><option>Neutral</option></select>
                                    </div>
                                    <div class="form-group">
                                        <label>Pola Candle</label>
                                        <input type="text" placeholder="Contoh: Engulfing">
                                    </div>
                                </div>
                                <div class="grid-3">
                                    <div class="form-group">
                                        <label>Harga Open</label>
                                        <input type="number" step="any">
                                    </div>
                                    <div class="form-group">
                                        <label>Harga Close</label>
                                        <input type="number" step="any">
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label>Catatan Tambahan</label>
                <textarea rows="4" placeholder="Alasan entry atau evaluasi..."></textarea>
            </div>

            <button type="button" class="btn-submit" onclick="alert('Data tersimpan! (Simulasi)')">Simpan Jurnal</button>
        </form>
    </div>
</div>

<script>
    // Inisialisasi Grafik Chart.js
    const ctx = document.getElementById('performanceChart').getContext('2d');
    const performanceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum'],
            datasets: [{
                label: 'Profit/Loss ($)',
                data: [120, 190, -50, 250, 400],
                borderColor: '#cc0000',
                backgroundColor: 'rgba(204, 0, 0, 0.2)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: false, grid: { color: '#333' } },
                x: { grid: { color: '#333' } }
            },
            plugins: {
                legend: { labels: { color: 'white' } }
            }
        }
    });
</script>

</body>
</html>
